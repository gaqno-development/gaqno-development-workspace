  # ════════════════════════════════════════════════════════════
  #  AUTOMATION
  # ════════════════════════════════════════════════════════════

  n8n:
    image: n8nio/n8n:latest
    container_name: gaqno-n8n
    restart: *restart
    environment:
      N8N_HOST: n8n.gaqno.com.br
      N8N_PORT: "5679"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.gaqno.com.br/
      N8N_EDITOR_BASE_URL: https://n8n.gaqno.com.br/
      GENERIC_TIMEZONE: America/Sao_Paulo
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${PG_HOST:-postgres}
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: gaqno_n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-}
    volumes:
      - n8n-data:/home/node/.n8n
    ports: ["5679:5679"]
    deploy:
      resources:
        limits: { memory: 512m, cpus: "1.0" }
    depends_on:
      postgres: { condition: service_healthy }
    networks: [gaqno]

  # ════════════════════════════════════════════════════════════
  #  MONITORING
  # ════════════════════════════════════════════════════════════

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: gaqno-node-exporter
    restart: *restart
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    deploy:
      resources:
        limits: { memory: 64m, cpus: "0.25" }
    networks: [gaqno]

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: gaqno-prometheus
    restart: *restart
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle
    ports: ["9090:9090"]
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.5" }
    networks: [gaqno]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: gaqno-postgres-exporter
    restart: *restart
    environment:
      DATA_SOURCE_URI: postgres:5432/gaqno_sso_db?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER:-postgres}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits: { memory: 64m, cpus: "0.25" }
    depends_on:
      postgres: { condition: service_healthy }
    networks: [gaqno]

  pushgateway:
    image: prom/pushgateway:v1.6.2
    container_name: gaqno-pushgateway
    restart: *restart
    deploy:
      resources:
        limits: { memory: 128m, cpus: "0.25" }
    networks: [gaqno]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: gaqno-cadvisor
    restart: *restart
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,resctrl,process
    privileged: true
    devices:
      - /dev/kmsg
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.5" }
    networks: [gaqno]

  container-name-mapper:
    image: docker:cli
    container_name: gaqno-container-mapper
    restart: *restart
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl jq > /dev/null 2>&1
        while true; do
          metrics=""
          for cid in $$(docker ps -q --no-trunc); do
            info=$$(docker inspect "$$cid" 2>/dev/null)
            name=$$(echo "$$info" | jq -r '.[0].Name' | sed 's|^/||')
            image=$$(echo "$$info" | jq -r '.[0].Config.Image')
            short=$$(echo "$$cid" | head -c 12)
            svc=$$(echo "$$info" | jq -r '.[0].Config.Labels["com.docker.compose.service"] // empty')
            comp=$$(echo "$$info" | jq -r '.[0].Config.Labels["com.docker.compose.project"] // empty')
            if [ -z "$$svc" ]; then svc="$$name"; fi
            if [ -z "$$comp" ]; then comp="$$name"; fi
            size=$$(echo "$$info" | jq -r '.[0].SizeRw // 0')
            metrics="$${metrics}container_info{container_id=\"$$cid\",short_id=\"$$short\",name=\"$$name\",service=\"$$svc\",component=\"$$comp\",image=\"$$image\"} 1\n"
            metrics="$${metrics}container_disk_usage_bytes{container_id=\"$$cid\",short_id=\"$$short\",name=\"$$name\",service=\"$$svc\",component=\"$$comp\"} $$size\n"
          done
          printf "$$metrics" | curl -s --data-binary @- "http://pushgateway:9091/metrics/job/container_info" 2>/dev/null
          sleep 60
        done
    deploy:
      resources:
        limits: { memory: 128m, cpus: "0.25" }
    networks: [gaqno]

  grafana:
    build:
      context: ./monitoring/grafana
      dockerfile: Dockerfile
    container_name: gaqno-grafana
    restart: *restart
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:5678}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-d628a8ac60069acccbc154d173b88717}
    volumes:
      - grafana-data:/var/lib/grafana
    ports: ["5678:3000"]
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.5" }
    depends_on:
      - prometheus
    networks: [gaqno]

# ══════════════════════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ══════════════════════════════════════════════════════════════

volumes:
  pgdata: {}
  redisdata: {}
  prometheus-data: {}
  grafana-data: {}
  n8n-data: {}

networks:
  gaqno:
    driver: bridge
  dokploy-edge:
    external: true
    name: ${CLOUDFLARED_EDGE_NETWORK:-dokploy-network}
