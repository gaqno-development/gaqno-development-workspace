x-pg-url: &pg-url "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432"
x-restart: &restart unless-stopped
x-backend-defaults: &backend-defaults
  restart: *restart
  networks: [gaqno]
  env_file: [.env.production]

services:

  # ════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: gaqno-postgres
    restart: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "2.0"
    networks: [gaqno]

  redis:
    image: redis:7-alpine
    container_name: gaqno-redis
    restart: *restart
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction --save ""
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 600m
          cpus: "0.5"
    networks: [gaqno]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gaqno-cloudflared
    restart: *restart
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - tunnel
      - --no-autoupdate
      - --metrics=0.0.0.0:60123
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks: [gaqno, dokploy-edge]

  # ════════════════════════════════════════════════════════════
  #  BACKEND SERVICES
  # ════════════════════════════════════════════════════════════

  sso-service:
    <<: *backend-defaults
    build:
      context: ./gaqno-sso-service
      args: { NPM_TOKEN: "${NPM_TOKEN}" }
    container_name: gaqno-sso-service
    ports: ["4001:4001"]
    environment:
      NODE_ENV: production
      PORT: "4001"
      DATABASE_URL: "${PG_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432}/gaqno_sso_db"
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      REDIS_URL: redis://redis:6379
      ADMIN_SERVICE_URL: http://admin-service:4010
      AI_SERVICE_URL: http://ai-service:4002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { memory: 512m, cpus: "1.0" }
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

