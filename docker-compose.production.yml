    ports: ["3009:3009"]
    deploy:
      resources:
        limits: { memory: 128m, cpus: "0.25" }
    networks: [gaqno]

  wellness-ui:
    build:
      context: ./gaqno-wellness-ui
      args:
        NPM_TOKEN: ${NPM_TOKEN}
        VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-https://portal.gaqno.com.br}
    container_name: gaqno-wellness-ui
    restart: *restart
    ports: ["3011:3011"]
    deploy:
      resources:
        limits: { memory: 128m, cpus: "0.25" }
    networks: [gaqno]

  intelligence-ui:
    build:
      context: ./gaqno-intelligence-ui
      args:
        NPM_TOKEN: ${NPM_TOKEN}
        VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-https://portal.gaqno.com.br}
    container_name: gaqno-intelligence-ui
    restart: *restart
    ports: ["3013:3013"]
    deploy:
      resources:
        limits: { memory: 128m, cpus: "0.25" }
    networks: [gaqno]

  dropshipping-admin-ui:
    build:
      context: ./gaqno-dropshipping-admin-ui
      args:
        NPM_TOKEN: ${NPM_TOKEN}
        VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-https://portal.gaqno.com.br}
    container_name: gaqno-dropshipping-admin-ui
    restart: *restart
    ports: ["3017:3017"]
    deploy:
