version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_platform
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gaqno-ai-platform-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    restart: unless-stopped

  ai-service:
    build:
      context: ./gaqno-ai-service
      dockerfile: Dockerfile
    container_name: gaqno-ai-service
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_platform
      REDIS_URL: redis://redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4002/v1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 30s
