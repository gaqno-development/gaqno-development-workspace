# Infinity datasource for Cloudflare DNS Analytics (used by Gaqno — DNS droppage dashboard).
# Bearer token is read from env: set CLOUDFLARE_API_TOKEN in Coolify (gaqno-grafana service env).
# Then in the DNS droppage dashboard, set variable zone_id to your Cloudflare Zone ID.
apiVersion: 1

datasources:
  - name: Infinity (Cloudflare)
    type: yesoreyeram-infinity-datasource
    access: proxy
    uid: infinity-cloudflare
    isDefault: false
    editable: true
    jsonData:
      auth_method: bearer
      allowedHosts:
        - https://api.cloudflare.com
        - https://api.cloudflare.com/client/v4/graphql
        - https://api.cloudflare.com/client/v4/user/tokens/verify
    secureJsonData:
      bearerToken: ${CLOUDFLARE_API_TOKEN}
