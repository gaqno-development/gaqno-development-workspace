services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --metrics=0.0.0.0:60123
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - dokploy-edge

networks:
  dokploy-edge:
    external: true
    name: ${CLOUDFLARED_EDGE_NETWORK:-dokploy-network}
