services:
  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    ports:
      - "9090:9090"
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
    env_file:
      - .env
    environment:
      - DATA_SOURCE_URI=${POSTGRES_EXPORTER_URI}
      - DATA_SOURCE_USER=${POSTGRES_EXPORTER_USER}
      - DATA_SOURCE_PASS=${POSTGRES_EXPORTER_PASS}
  pushgateway:
    image: prom/pushgateway:v1.6.2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,resctrl,process
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
  container-name-mapper:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl jq > /dev/null 2>&1
        while true; do
          metrics=""
          for cid in $$(docker ps -q --no-trunc); do
            info=$$(docker inspect "$$cid" 2>/dev/null)
            name=$$(echo "$$info" | jq -r '.[0].Name' | sed 's|^/||')
            image=$$(echo "$$info" | jq -r '.[0].Config.Image')
            short=$$(echo "$$cid" | head -c 12)
            svc=$$(echo "$$info" | jq -r '.[0].Config.Labels["coolify.resourceName"] // empty')
            comp=$$(echo "$$info" | jq -r '.[0].Config.Labels["coolify.serviceName"] // empty')
            if [ -z "$$svc" ]; then svc="$$name"; fi
            if [ -z "$$comp" ]; then comp="$$name"; fi
            size=$$(echo "$$info" | jq -r '.[0].SizeRw // 0')
            metrics="$${metrics}container_info{container_id=\"$$cid\",short_id=\"$$short\",name=\"$$name\",service=\"$$svc\",component=\"$$comp\",image=\"$$image\"} 1\n"
            metrics="$${metrics}container_disk_usage_bytes{container_id=\"$$cid\",short_id=\"$$short\",name=\"$$name\",service=\"$$svc\",component=\"$$comp\"} $$size\n"
          done
          printf "$$metrics" | curl -s --data-binary @- "http://pushgateway:9091/metrics/job/container_info" 2>/dev/null
          sleep 60
        done
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command:
      - tunnel
      - --no-autoupdate
      - --metrics=0.0.0.0:60123
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3100:3100"
  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
    depends_on:
      - loki
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATASOURCES_DEFAULT_NAME=Prometheus
      - GF_DATASOURCES_DEFAULT_TYPE=prometheus
      - GF_DATASOURCES_DEFAULT_ACCESS=proxy
      - GF_DATASOURCES_DEFAULT_URL=http://prometheus:9090
      - GF_DATASOURCES_DEFAULT_IS_DEFAULT=true
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-d628a8ac60069acccbc154d173b88717}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/dashboards
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "5678:3000"
    depends_on:
      - prometheus
      - loki
configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets: ["localhost:9090"]
        - job_name: node-exporter
          static_configs:
            - targets: ["node-exporter:9100"]
        - job_name: cadvisor
          static_configs:
            - targets: ["cadvisor:8080"]
        - job_name: postgres-exporter
          static_configs:
            - targets: ["postgres-exporter:9187"]
        - job_name: pushgateway
          honor_labels: true
          static_configs:
            - targets: ["pushgateway:9091"]
        - job_name: cloudflared
          static_configs:
            - targets: ["cloudflared:60123"]
  loki_config:
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
      common:
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory
      schema_config:
        configs:
          - from: "2020-10-24"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h
      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
  promtail_config:
    content: |
      server:
        http_listen_port: 9080
      positions:
        filename: /tmp/positions.yaml
      clients:
        - url: http://loki:3100/loki/api/v1/push
      scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: ["__meta_docker_container_name"]
              regex: "/(.*)"
              target_label: "container"
            - source_labels: ["__meta_docker_container_log_stream"]
              target_label: "logstream"
            - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
              target_label: "service"
          pipeline_stages:
            - json:
                expressions:
                  level: level
                  service: service
                  msg: msg
            - labels:
                level:
                service:
volumes:
  prometheus-data: {}
  grafana-data: {}
  loki-data: {}
