services:
  dokploy-mcp:
    build: .
    ports:
      - "3001:3001"
    environment:
      DOKPLOY_API_KEY: ${DOKPLOY_API_KEY}
      DOKPLOY_BASE_URL: ${DOKPLOY_BASE_URL:-http://host.docker.internal:3000/api}
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3001"
      MCP_HTTP_AUTH_TOKEN: ${MCP_HTTP_AUTH_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
